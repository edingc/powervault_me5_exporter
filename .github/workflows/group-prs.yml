name: Combine Dependabot PRs

on:
  workflow_dispatch:

# The minimum permissions required to run this Action
permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  combine-prs:
    runs-on: ubuntu-latest

    steps:
      - name: combine-prs
        id: combine-prs
        uses: github/combine-prs@v5.2.2
        with:
          title: Dependabot combined pull requests
          assignees: edingc
          labels: combined-pr
